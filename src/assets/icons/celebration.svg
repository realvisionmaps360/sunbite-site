<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#ffffff"/>
  <!-- Party popper body -->
  <g fill="none" stroke="#841412" stroke-linecap="round" stroke-linejoin="round">
    <!-- Popper cone -->
    <polygon points="80,320 160,240 260,180 220,280" fill="#841412" stroke="none"/>
    <polygon points="80,320 160,240 260,180 220,280" fill="none" stroke="#841412" stroke-width="10"/>
    <!-- Popper opening burst lines -->
    <line x1="260" y1="180" x2="290" y2="140" stroke-width="12"/>
    <line x1="260" y1="180" x2="305" y2="170" stroke-width="12"/>
    <line x1="260" y1="180" x2="275" y2="210" stroke-width="12"/>
    <!-- Confetti dots and stars -->
    <!-- Star 1 -->
    <polygon points="310,100 318,124 344,124 324,138 332,162 310,148 288,162 296,138 276,124 302,124" fill="#841412" stroke="none" transform="scale(0.55) translate(250,60)"/>
    <!-- Star 2 small -->
    <polygon points="310,100 318,124 344,124 324,138 332,162 310,148 288,162 296,138 276,124 302,124" fill="#841412" stroke="none" transform="scale(0.35) translate(590,200)"/>
    <!-- Star 3 small -->
    <polygon points="310,100 318,124 344,124 324,138 332,162 310,148 288,162 296,138 276,124 302,124" fill="#841412" stroke="none" transform="scale(0.3) translate(730,50)"/>
    <!-- Confetti squares rotated -->
    <rect x="290" y="90" width="22" height="22" rx="3" fill="#841412" transform="rotate(20,301,101)"/>
    <rect x="340" y="150" width="16" height="16" rx="2" fill="#841412" transform="rotate(-15,348,158)"/>
    <rect x="230" y="70" width="18" height="18" rx="3" fill="#841412" transform="rotate(35,239,79)"/>
    <rect x="350" y="240" width="14" height="14" rx="2" fill="#841412" transform="rotate(25,357,247)"/>
    <!-- Streamers -->
    <path d="M265 175 Q295 145 310 115 Q325 85 350 75" stroke-width="8" stroke="#841412" fill="none" stroke-dasharray="none"/>
    <path d="M265 175 Q285 160 310 170 Q335 180 350 165" stroke-width="6" stroke="#841412" fill="none" opacity="0.6"/>
    <!-- Diagonal stripe on cone -->
    <line x1="110" y1="290" x2="230" y2="210" stroke-width="8" stroke="#ffffff"/>
    <line x1="130" y1="308" x2="250" y2="228" stroke-width="8" stroke="#ffffff"/>
  </g>
</svg>
