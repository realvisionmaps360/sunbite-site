  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #841412;
      --brand-dark: #3D0A09;
      --cream:      #F5E6C8;
      --cream-soft: #FDF6E9;
      --gold:       #D4AF37;
      --gold-light: #F0D060;
      --gold-dim:   rgba(212,175,55,0.35);
      --ink:        #1A0A09;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1A0504;
      background-image:
        radial-gradient(ellipse 120% 60% at 50% -10%, #841412 0%, transparent 55%),
        radial-gradient(ellipse 80%  40% at 50% 110%, #500D0C 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--cream);
      position: relative;
      padding: 16px 20px 20px;
      gap: 0;
    }

    /* â”€â”€ Floating particles â”€â”€ */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: float-up linear infinite;
      opacity: 0;
      z-index: 0;
    }
    @keyframes float-up {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.7; }
      100% { transform: translateY(-60px) rotate(720deg); opacity: 0; }
    }

    /* â”€â”€ Top hint â”€â”€ */
    .top-hint {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      color: rgba(245,230,200,0.45);
      letter-spacing: 1.5px;
      margin-bottom: 14px;
      z-index: 10;
      text-align: center;
    }

    /* â”€â”€ Progress dots â”€â”€ */
    .dots {
      display: flex;
      gap: 9px;
      justify-content: center;
      margin-bottom: 18px;
      z-index: 10;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(212,175,55,0.2);
      border: 1px solid rgba(212,175,55,0.35);
      transition: all 0.45s cubic-bezier(.4,0,.2,1);
    }
    .dot.active { background: var(--gold); transform: scale(1.4); }
    .dot.done   { background: rgba(212,175,55,0.5); }

    /* â”€â”€ Scene + deck illusion â”€â”€ */
    .scene {
      width: 100%;
      max-width: 340px;
      perspective: 1400px;
      z-index: 10;
    }

    .deck {
      position: relative;
      width: 100%;
    }

    /* fake stacked cards behind */
    .deck::before,
    .deck::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      border: 1.5px solid var(--gold-dim);
      background: linear-gradient(145deg, #2D0908, #5C1211);
    }
    .deck::before { transform: translateY(10px) translateX(5px) rotate(2.5deg); z-index: -1; }
    .deck::after  { transform: translateY(5px)  translateX(2px) rotate(1deg);   z-index: -2; }

    /* â”€â”€ Card wrapper (flip container) â”€â”€ */
    .card {
      position: relative;
      width: 100%;
      padding-bottom: 152%; /* ~tarot 2:3 */
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
      border-radius: 20px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card.flyoff  { animation: flyoff 0.7s cubic-bezier(.4,0,.2,1) forwards; }

    @keyframes flyoff {
      0%   { transform: rotateY(180deg) scale(1) translateY(0);    opacity: 1; }
      100% { transform: rotateY(180deg) scale(0.65) translateY(-130%) rotateZ(-14deg); opacity: 0; }
    }

    /* â”€â”€ Shared face/back styles â”€â”€ */
    .face, .back {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* â”â”â” FACE (tarot back â€” shown face-down) â”â”â” */
    .face {
      background: linear-gradient(150deg, #2D0908 0%, #6A1514 45%, #2D0908 100%);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(212,175,55,0.25),
        0 24px 70px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(212,175,55,0.15);
      animation: pulse-glow 2.8s ease-in-out infinite;
    }
    .card.flipped .face,
    .card.flyoff  .face { animation: none; }

    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 0 1px rgba(212,175,55,0.25), 0 24px 70px rgba(0,0,0,0.7), 0 0 30px rgba(212,175,55,0.15); }
      50%      { box-shadow: 0 0 0 1px rgba(212,175,55,0.5),  0 24px 70px rgba(0,0,0,0.7), 0 0 70px rgba(212,175,55,0.35); }
    }

    /* inner border */
    .face::before {
      content: '';
      position: absolute;
      inset: 9px;
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 13px;
      background: repeating-linear-gradient(
        45deg,
        transparent, transparent 5px,
        rgba(212,175,55,0.025) 5px, rgba(212,175,55,0.025) 6px
      );
      pointer-events: none;
    }

    .tarot-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 28px 24px;
      text-align: center;
    }

    .tarot-stars { font-size: 16px; letter-spacing: 10px; color: var(--gold-light); opacity: 0.75; }

    .tarot-emblem {
      width: 130px; height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--gold);
      box-shadow: 0 0 35px rgba(212,175,55,0.5), 0 0 70px rgba(212,175,55,0.15);
      filter: sepia(15%) saturate(1.1) brightness(0.95);
    }

    .tarot-name {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--gold);
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 0 25px rgba(212,175,55,0.6);
    }

    .tarot-sub {
      font-size: 10px;
      color: rgba(212,175,55,0.55);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* corner runes */
    .rune {
      position: absolute;
      font-size: 18px;
      color: rgba(212,175,55,0.45);
      line-height: 1;
    }
    .rune.tl { top: 14px; left: 14px; }
    .rune.tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .rune.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .rune.br { bottom: 14px; right: 14px; transform: scale(-1); }

    /* stars scattered */
    .star-scatter {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .s {
      position: absolute;
      color: var(--gold-light);
      animation: twinkle 2.2s ease-in-out infinite alternate;
      opacity: 0.25;
    }
    @keyframes twinkle {
      from { opacity: 0.08; transform: scale(0.7); }
      to   { opacity: 0.45; transform: scale(1.2); }
    }

    /* shimmer sweep */
    .shimmer-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg,
        transparent 35%,
        rgba(255,255,255,0.06) 50%,
        transparent 65%
      );
      animation: shimmer-sweep 3.5s ease-in-out infinite;
      pointer-events: none;
      z-index: 3;
    }
    @keyframes shimmer-sweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* â”â”â” BACK (content side) â”â”â” */
    .back {
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      border: 2px solid transparent;
    }

    .inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 22px 48px;
      text-align: center;
      gap: 14px;
      overflow: hidden;
    }

    /* card-specific themes */
    .s1 { background: linear-gradient(155deg, #0C0404 0%, #3D0A09 55%, #180605 100%); border-color: var(--gold); }
    .s2 { background: linear-gradient(155deg, #FDF6E9 0%, #F5E6C8 100%); border-color: var(--brand); color: var(--ink); }
    .s3 { background: linear-gradient(155deg, #7A1210 0%, #C41E1B 60%, #841412 100%); border-color: var(--gold); }
    .s4 { background: linear-gradient(155deg, #0E2A1C 0%, #1B4830 100%); border-color: #52C47E; }
    .s5 { background: linear-gradient(155deg, #FDF6E9 0%, #FFE8D0 100%); border-color: var(--brand); color: var(--ink); }
    .s6 { background: linear-gradient(145deg, #841412 0%, #B5860D 70%, #D4AF37 100%); border-color: var(--gold-light); }

    /* text helpers */
    .eyebrow {
      font-size: 9.5px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      opacity: 0.65;
      font-weight: 600;
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      line-height: 1.12;
      font-weight: 900;
    }
    .body-text {
      font-size: 14.5px;
      line-height: 1.72;
      opacity: 0.88;
      max-width: 270px;
    }
    .script {
      font-family: 'Pacifico', cursive;
      font-size: 38px;
      line-height: 1.15;
    }

    /* tap hint */
    .tap {
      position: absolute;
      bottom: 14px;
      font-size: 10.5px;
      opacity: 0.4;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* divider */
    .divider {
      width: 50px; height: 1.5px;
      background: currentColor;
      opacity: 0.3;
      border-radius: 2px;
    }

    /* buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 11px 22px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13.5px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform .18s, box-shadow .18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      width: 100%;
      justify-content: center;
    }
    .btn:active { transform: scale(0.96) !important; }

    .btn-maps { background: #34A853; color: #fff; box-shadow: 0 4px 22px rgba(52,168,83,0.45); }
    .btn-maps:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(52,168,83,0.5); }

    .btn-360 {
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      backdrop-filter: blur(12px);
    }
    .btn-360:hover { transform: translateY(-2px); background: rgba(255,255,255,0.18); }

    /* product circle */
    .prod-img {
      width: 100px; height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--brand);
      box-shadow: 0 8px 30px rgba(132,20,18,0.35);
    }

    /* QR placeholder */
    .qr-box {
      width: 110px; height: 110px;
      background: white;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: #444;
      font-size: 10px;
      text-align: center;
      padding: 8px;
      line-height: 1.5;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    }
    .qr-box svg { opacity: 0.5; }

    /* logo in cards */
    .logo-dark  { width: 72px; height: auto; filter: brightness(0); }
    .logo-light { width: 90px; height: auto; filter: brightness(0) invert(1); }
    .wordmark-dark  { width: 150px; height: auto; filter: brightness(0); }

    /* emoji row */
    .emoji-row { font-size: 22px; letter-spacing: 6px; }

  </style>
</head>

    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.id = 'dot' + i;
      dotsEl.appendChild(d);
    }

    /* â”€â”€ scatter stars on tarot face â”€â”€ */
    const sf = document.getElementById('starField');
    const GLYPHS = ['â˜…','âœ¦','Â·','âœ§','â•'];
    for (let i = 0; i < 22; i++) {
      const s = document.createElement('span');
      s.className = 's';
      s.textContent = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
      s.style.top  = Math.random() * 100 + '%';
      s.style.left = Math.random() * 100 + '%';
      s.style.fontSize = (7 + Math.random() * 13) + 'px';
      s.style.animationDelay = Math.random() * 2.5 + 's';
      sf.appendChild(s);
    }

    /* â”€â”€ floating particles â”€â”€ */
    const fx = document.getElementById('fx');
    const COLORS = ['#D4AF37','#841412','#F5E6C8','#E85D30','#F0D060','#fff'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      p.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
      p.style.animationDuration = (7 + Math.random() * 9) + 's';
      p.style.animationDelay    = (Math.random() * 10) + 's';
      fx.appendChild(p);
    }

    /* â”€â”€ load step content â”€â”€ */
    function loadStep(n) {
      const back = document.getElementById('back');
      back.className = 'back ' + steps[n].cls;
      back.innerHTML  = steps[n].html;
    }

    loadStep(0);

    /* â”€â”€ update dots â”€â”€ */
    function refreshDots() {
      for (let i = 0; i < TOTAL; i++) {
        const d = document.getElementById('dot' + i);
        if (i < step) d.className = 'dot done';
        else if (i === step) d.className = 'dot active';
        else d.className = 'dot';
      }
    }

    /* â”€â”€ main click handler â”€â”€ */
    function handleClick() {
      if (phase === 'anim') return;
      const card = document.getElementById('card');

      if (phase === 'down') {
        card.classList.add('flipped');
        phase = 'up';
        return;
      }

      if (phase === 'up') {
        if (step === TOTAL - 1) return; // done â€” no more cards
        phase = 'anim';
        card.classList.add('flyoff');

        setTimeout(() => {
          step++;
          refreshDots();
          loadStep(step);
          card.classList.remove('flipped', 'flyoff');
          phase = 'down';
        }, 700);
      }
    }

    refreshDots();
  </script>
</body>
</html>
