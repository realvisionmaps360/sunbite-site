<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sunbite – Grand Opening · 18. Juli 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Plus+Jakarta+Sans:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet" />
  <!-- Motion.js v11 UMD — vanilla JS animation library (skill: motion-framer) -->
  <script src="https://cdn.jsdelivr.net/npm/motion@11/dist/motion.min.js" crossorigin></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --choc:       #2A0F06;
      --choc-mid:   #6B2D1A;
      --berry:      #8B1515;
      --berry-mid:  #A41818;
      --cream:      #F5E6C8;
      --cream-soft: #FDF6E9;
      --gold:       #D4AF37;
      --gold-light: #F0D060;
      --gold-dim:   rgba(212,175,55,0.28);
      --ink:        #1A0A06;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: #2A0F06;
      background-image:
        radial-gradient(ellipse 130% 55% at 50% -5%,  #6B2D1A 0%, transparent 55%),
        radial-gradient(ellipse 90%  45% at 50% 108%, #4A1A0C 0%, transparent 50%);
      height: calc(var(--vh, 1vh) * 100);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--cream);
      position: relative;
      padding: 16px 20px 20px;
    }

    /* ── Language Toggle ── */
    .lang-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(20, 6, 2, 0.72);
      border: 1px solid rgba(212,175,55,0.32);
      border-radius: 999px;
      padding: 5px 11px;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-lang {
      background: none;
      border: none;
      color: rgba(212,175,55,0.38);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      cursor: pointer;
      padding: 1px 3px;
      transition: color 0.2s;
    }
    .btn-lang.active { color: var(--gold); }
    .lang-sep { color: rgba(212,175,55,0.22); font-size: 11px; }

    /* ── Particles ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      animation: float-up linear infinite;
      opacity: 0;
      z-index: 0;
    }
    @keyframes float-up {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      8%   { opacity: 0.75; }
      92%  { opacity: 0.55; }
      100% { transform: translateY(-60px) rotate(720deg); opacity: 0; }
    }

    /* ── Top hint ── */
    .top-hint {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(245,230,200,0.38);
      letter-spacing: 1.5px;
      margin-bottom: 13px;
      z-index: 10;
      text-align: center;
    }

    /* ── Progress dots ── */
    .dots {
      display: flex;
      gap: 9px;
      justify-content: center;
      margin-bottom: 16px;
      z-index: 10;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(212,175,55,0.14);
      border: 1px solid rgba(212,175,55,0.28);
      transition: all 0.45s cubic-bezier(.4,0,.2,1);
    }
    .dot.active { background: var(--gold); transform: scale(1.4); }
    .dot.done   { background: rgba(212,175,55,0.42); }

    /* ── Scene / Deck ── */
    .scene {
      width: min(92vw, 380px);
      perspective: 1400px;
      z-index: 10;
    }
    .deck { position: relative; width: 100%; }

    .deck::before, .deck::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      border: 1.5px solid var(--gold-dim);
      background: linear-gradient(145deg, #3D1C0D, #6B2D1A);
    }
    .deck::before { transform: translateY(10px) translateX(5px) rotate(2.5deg); z-index: -1; }
    .deck::after  { transform: translateY(5px)  translateX(2px) rotate(1deg);   z-index: -2; }

    /* ── Card flip container ── */
    .card {
      position: relative;
      width: 100%;
      padding-bottom: min(175%, 82dvh);
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
      border-radius: 20px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card.flyoff  { animation: flyoff 0.7s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes flyoff {
      0%   { transform: rotateY(180deg) scale(1)    translateY(0);     opacity: 1; }
      100% { transform: rotateY(180deg) scale(0.65) translateY(-130%) rotateZ(-14deg); opacity: 0; }
    }

    /* ── Shared face / back ── */
    .face, .back {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* ══ FACE — Sunbite brand (shown before flip) ══ */
    .face {
      background: linear-gradient(150deg, #1E0904 0%, #5C2010 50%, #1E0904 100%);
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(212,175,55,0.18),
        0 24px 70px rgba(0,0,0,0.72),
        inset 0 1px 0 rgba(212,175,55,0.1);
      animation: pulse-glow 3s ease-in-out infinite;
    }
    .card.flipped .face,
    .card.flyoff  .face { animation: none; pointer-events: none; }
    @keyframes pulse-glow {
      0%,100% { box-shadow: 0 0 0 1px rgba(212,175,55,0.18), 0 24px 70px rgba(0,0,0,0.72), 0 0 28px rgba(212,175,55,0.1); }
      50%      { box-shadow: 0 0 0 1px rgba(212,175,55,0.42), 0 24px 70px rgba(0,0,0,0.72), 0 0 58px rgba(212,175,55,0.26); }
    }

    /* inner border line */
    .face::before {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 13px;
      pointer-events: none;
    }

    .face-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      padding: 32px 24px;
      text-align: center;
    }

    .face-orn {
      font-size: 11px;
      color: rgba(212,175,55,0.45);
      letter-spacing: 10px;
    }

    /* Logo: contain so full wordmark is visible, no cropping */
    .face-logo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: contain;
      background: #6B1515;
      border: 2px solid rgba(212,175,55,0.6);
      box-shadow: 0 0 28px rgba(212,175,55,0.35), 0 0 60px rgba(212,175,55,0.1);
    }

    .face-divider {
      width: 65px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
    }

    .face-date {
      font-size: 10px;
      color: rgba(212,175,55,0.48);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .face-hint {
      font-size: 10px;
      color: rgba(245,230,200,0.28);
      letter-spacing: 1px;
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }

    /* Shimmer */
    .shimmer-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 35%, rgba(255,255,255,0.045) 50%, transparent 65%);
      animation: shimmer-sweep 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 3;
    }
    @keyframes shimmer-sweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    /* ══ BACK — Content side ══ */
    .back {
      transform: rotateY(180deg);
      border: 2px solid transparent;
    }

    .inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 26px 22px 42px;
      text-align: center;
      gap: 11px;
      overflow: hidden;
    }

    /* Card themes */
    .c1 { background: #F5EBDA; border-color: #8B1515; color: #8B1515; }
    .c2 { background: #F5EBDA; border-color: #8B1515; color: var(--ink); }
    .c3 { background: #F5EBDA; border-color: #8B1515; color: #8B1515; }
    .c4 { background: #F5EBDA; border-color: #8B1515; color: #8B1515; }

    /* Typography */
    .eyebrow {
      font-size: 9px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      opacity: 0.65;
      font-weight: 600;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 27px;
      line-height: 1.12;
      font-weight: 900;
    }
    .script {
      font-family: 'Pacifico', cursive;
      font-size: 34px;
      line-height: 1.15;
    }
    .body-text {
      font-size: 13.5px;
      line-height: 1.72;
      opacity: 0.88;
      max-width: 272px;
    }

    /* Ornamental divider */
    .orn {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0.32;
      width: 82%;
    }
    .orn-line { flex: 1; height: 1px; background: currentColor; }
    .orn-gem  { font-size: 8px; }

    /* Tap hint */
    .tap {
      position: absolute;
      bottom: 12px;
      font-size: 10px;
      opacity: 0.33;
      letter-spacing: 0.5px;
      font-style: italic;
      font-family: 'Playfair Display', serif;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: transform .18s, box-shadow .18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
      width: 100%;
      justify-content: center;
    }
    .btn:active { transform: scale(0.95) !important; }

    .btn-maps {
      background: #34A853;
      color: #fff;
      box-shadow: 0 4px 20px rgba(52,168,83,0.38);
    }
    .btn-maps:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(52,168,83,0.48); }

    .btn-360 {
      background: rgba(139,21,21,0.1);
      color: #8B1515;
      border: 1.5px solid rgba(139,21,21,0.35);
    }
    .btn-360:hover { transform: translateY(-2px); background: rgba(139,21,21,0.18); }

    .btn-restart {
      background: #8B1515;
      color: #F5EBDA;
      font-weight: 800;
      box-shadow: 0 4px 20px rgba(139,21,21,0.38);
      font-size: 12.5px;
    }
    .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,21,21,0.5); }

    /* Product image */
    .prod-img {
      width: 88px; height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--berry);
      box-shadow: 0 8px 26px rgba(122,16,16,0.32);
    }

    /* QR placeholder */
    .qr-box {
      width: 96px; height: 96px;
      background: white;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      color: #444;
      font-size: 9.5px;
      text-align: center;
      padding: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
      line-height: 1.4;
    }
    .qr-box svg { opacity: 0.42; }

    /* Logo helpers */
    .logo-dark    { width: 65px;  height: auto; filter: brightness(0); }
    .logo-light   { width: 82px;  height: auto; filter: brightness(0) invert(1); }
    .wordmark-dark { width: 135px; height: auto; filter: brightness(0); }

    /* Emoji row */
    .emoji-row { font-size: 20px; letter-spacing: 8px; }

    /* Price badge — card 3 */
    .price-badge {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      color: #8B1515;
      letter-spacing: 0.5px;
      border: 1px solid rgba(139,21,21,0.35);
      border-radius: 6px;
      padding: 4px 12px;
      background: rgba(139,21,21,0.08);
    }

    /* Reduced motion: disable all JS-driven animations */
    @media (prefers-reduced-motion: reduce) {
      .particle { display: none; }
      .shimmer-wrap::after { display: none; }
      .face { animation: none !important; }
      .card { transition: none !important; }
    }

    /* ── Mobile fullscreen ── */
    @media (max-width: 500px) {
      body {
        padding: 0;
        justify-content: flex-start;
        align-items: stretch;
        gap: 0;
      }
      .top-hint {
        padding-top: 10px;
        margin-bottom: 8px;
      }
      .dots {
        margin-bottom: 8px;
      }
      .scene {
        width: 100%;
        max-width: 100%;
        flex: 1;
      }
      .deck {
        height: 100%;
      }
      .card {
        padding-bottom: 0;
        height: 100%;
        border-radius: 12px 12px 0 0;
      }
      .deck::before,
      .deck::after {
        display: none;
      }
      .face,
      .back {
        border-radius: 12px 12px 0 0;
      }
      /* Toggle maior e fácil de tocar */
      .lang-toggle {
        top: 12px;
        right: 12px;
        padding: 8px 16px;
        gap: 6px;
      }
      .btn-lang {
        font-size: 13px;
        padding: 3px 6px;
        min-height: 32px;
        display: flex;
        align-items: center;
      }
      .lang-sep {
        font-size: 14px;
      }
    }

  </style>
</head>
<body>

  <!-- Particles -->
  <div id="fx"></div>

  <!-- Language Toggle -->
  <div class="lang-toggle" id="langToggle">
    <button class="btn-lang active" data-lang="de" onclick="setLang('de')">DE</button>
    <span class="lang-sep">|</span>
    <button class="btn-lang" data-lang="en" onclick="setLang('en')">EN</button>
  </div>

  <!-- Top hint -->
  <p class="top-hint" id="topHint">✦ Tippe zum Enthüllen</p>

  <!-- Progress dots -->
  <div class="dots" id="dots"></div>

  <!-- Scene -->
  <div class="scene">
    <div class="deck">
      <div class="card shimmer-wrap" id="card" onclick="handleClick()">

        <!-- FACE: Sunbite brand -->
        <div class="face shimmer-wrap">
          <div class="face-content">
            <div class="face-orn">✦ &nbsp; ✦ &nbsp; ✦</div>
            <!-- absolute path — works on /invitation without trailing slash -->
            <img src="/invitation/assets/logo-oficial.png" alt="Sunbite" class="face-logo" />
            <div class="face-divider"></div>
            <div class="face-date">Grand Opening &nbsp;·&nbsp; 18. Juli 2026</div>
            <div class="face-orn">✦ &nbsp; ✦ &nbsp; ✦</div>
            <div class="face-hint" id="faceHint">Tippe um zu öffnen</div>
          </div>
        </div>

        <!-- BACK: Content (filled by JS) -->
        <div class="back" id="back"></div>

      </div>
    </div>
  </div>

  <script>
    /* ─── iOS viewport height fix ─── */
    function setVh() { document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px'); }
    setVh();
    window.addEventListener('resize', setVh);

    /* ─── Reduced motion guard (skill: motion-framer — accessibility) ─── */
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const M = window.Motion || null; // graceful fallback if CDN fails

    /* ─── Motion helpers (motion-framer skill patterns) ─── */
    function motionEntranceCard() {
      if (prefersReduced || !M) return;
      M.animate('#card', { scale: [0.88, 1], opacity: [0, 1] }, {
        duration: 0.65,
        easing: M.spring({ stiffness: 180, damping: 18 })
      });
    }

    function motionStaggerContent(container) {
      if (prefersReduced || !M) return;
      const els = container.querySelectorAll('.inner > *');
      if (!els.length) return;
      M.animate(els, { opacity: [0, 1], y: [12, 0] }, {
        delay: M.stagger(0.055),
        duration: 0.30,
        easing: 'ease-out'
      });
    }

    function motionLangBounce(el) {
      if (prefersReduced || !M) return;
      M.animate(el, { scale: [1, 1.18, 0.95, 1] }, { duration: 0.32, easing: 'ease-out' });
    }

    /* ─── Language ─── */
    let lang = 'de';

    const i18n = {
      topHint:  { de: '✦ Tippe zum Enthüllen', en: '✦ Tap to Reveal' },
      faceHint: { de: 'Tippe um zu öffnen',    en: 'Tap to open'      },
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.btn-lang').forEach(el => {
        el.classList.toggle('active', el.dataset.lang === l);
      });
      document.getElementById('topHint').textContent  = i18n.topHint[l];
      document.getElementById('faceHint').textContent = i18n.faceHint[l];
      motionLangBounce(document.getElementById('langToggle'));
      loadStep(step);
    }

    /* ─── Card content (4 cards, DE + EN) ─── */
    const steps = [

      /* Card 1 — Das Geheimnis / The Secret */
      {
        cls: 'c1',
        de: `
          <div class="inner" style="color:#8B1515">
            <div class="eyebrow" style="color:rgba(139,21,21,.6)">✦ Eine Überraschung ✦</div>
            <div class="script" style="color:#8B1515; font-size:32px">Es beginnt…</div>
            <div class="orn"><div class="orn-line"></div><div class="orn-gem">◆</div><div class="orn-line"></div></div>
            <p class="body-text" style="color:#5C0E0E; font-style:italic; font-family:'Playfair Display',serif; font-size:13.5px">
              Monate der Arbeit im Verborgenen.<br/>
              Heute enthüllen wir unser Geheimnis.<br/><br/>
              <span style="color:rgba(139,21,21,.65); font-size:12.5px">
                Wir freuen uns so, das mit dir zu teilen —<br/>und möchten, dass du dabei bist.
              </span>
            </p>
            <div class="emoji-row" style="opacity:.82">🌟 ✨ 🍓</div>
            <span class="tap" style="color:rgba(139,21,21,.4)">↓ tippe um fortzufahren</span>
          </div>
        `,
        en: `
          <div class="inner" style="color:#8B1515">
            <div class="eyebrow" style="color:rgba(139,21,21,.6)">✦ A Surprise ✦</div>
            <div class="script" style="color:#8B1515; font-size:32px">It begins…</div>
            <div class="orn"><div class="orn-line"></div><div class="orn-gem">◆</div><div class="orn-line"></div></div>
            <p class="body-text" style="color:#5C0E0E; font-style:italic; font-family:'Playfair Display',serif; font-size:13.5px">
              Months of work, kept in secret.<br/>
              Today we finally reveal it.<br/><br/>
              <span style="color:rgba(139,21,21,.65); font-size:12.5px">
                We're so happy to share this with you —<br/>and we want <em>you</em> to be part of it.
              </span>
            </p>
            <div class="emoji-row" style="opacity:.82">🌟 ✨ 🍓</div>
            <span class="tap" style="color:rgba(139,21,21,.4)">↓ tap to continue</span>
          </div>
        `
      },

      /* Card 2 — Einladung / The Invitation + Date */
      {
        cls: 'c2',
        de: `
          <div class="inner">
            <img src="/invitation/assets/logo-oficial.png" alt="Sunbite" style="width:52px; height:52px; border-radius:8px; object-fit:contain; background:#6B1515;"/>
            <div class="eyebrow" style="color:#8B1515">Persönliche Einladung</div>
            <div class="orn" style="color:#8B1515"><div class="orn-line"></div><div class="orn-gem">◆</div><div class="orn-line"></div></div>
            <div class="script" style="color:#8B1515; font-size:30px">18. Juli 2026</div>
            <div style="font-family:'Playfair Display',serif; font-size:21px; font-weight:700; color:#8B1515; letter-spacing:2px">20:00 — 00:00</div>
            <div class="orn" style="color:#8B1515"><div class="orn-line"></div><div class="orn-gem">◆</div><div class="orn-line"></div></div>
            <div style="font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:var(--ink); line-height:1.35">
              Am Aareufer<br/>
              <span style="font-size:13px; font-weight:400; font-style:italic; color:#8B1515bb">Aarau, Schweiz</span>
            </div>
            <p class="body-text" style="font-size:12.5px; color:#8B1515cc">Musik · Lachen · Sommerabend</p>
            <div style="display:flex; flex-direction:column; gap:8px; width:100%;">
              <a href="#" class="btn btn-maps" onclick="event.stopPropagation()">🗺️ &nbsp;Google Maps</a>
              <button class="btn btn-360" onclick="event.stopPropagation()">🌐 &nbsp;360° Ansicht</button>
            </div>
            <span class="tap" style="color:rgba(122,16,16,.32)">↓ tippe um fortzufahren</span>
          </div>
        `,
        en: `
          <div class="inner">
            <img src="/invitation/assets/logo-oficial.png" alt="Sunbite" style="width:52px; height:52px; border-radius:8px; object-fit:contain; background:#6B1515;"/>
            <div class="eyebrow" style="color:#8B1515">Personal Invitation</div>

    const TOTAL = steps.length;
    let step  = 0;
    let phase = 'down'; // 'down' | 'up' | 'anim'

    /* ─── Build dots ─── */
    const dotsEl = document.getElementById('dots');
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.id = 'dot' + i;
      dotsEl.appendChild(d);
    }

    /* ─── Floating particles ─── */
    if (!prefersReduced) {
      const fx = document.getElementById('fx');
      const COLORS = ['#D4AF37','#8B1A1A','#F5E6C8','#C04A30','#F0D060','#fff'];
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = (2 + Math.random() * 3.5) + 'px';
        p.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
        p.style.animationDuration = (8 + Math.random() * 8) + 's';
        p.style.animationDelay    = (Math.random() * 10) + 's';
        fx.appendChild(p);
      }
    }

    /* ─── Load step ─── */
    function loadStep(n) {
      const back = document.getElementById('back');
      back.className = 'back ' + steps[n].cls;
      back.innerHTML = steps[n][lang] || steps[n].de;
      // Stagger content in (motion-framer skill: stagger pattern)
      setTimeout(() => motionStaggerContent(back), 60);
    }

    loadStep(0);

    /* ─── Refresh dots ─── */
    function refreshDots() {
      for (let i = 0; i < TOTAL; i++) {
        const d = document.getElementById('dot' + i);
        if (i < step)        d.className = 'dot done';
        else if (i === step)  d.className = 'dot active';
        else                  d.className = 'dot';
      }
    }

    /* ─── Restart ─── */
    function restartExp() {
      step  = 0;
      phase = 'down';
      const card = document.getElementById('card');
      card.classList.remove('flipped', 'flyoff');
      card.style.opacity = '1';
      refreshDots();
      loadStep(0);
    }

    /* ─── Main click handler ─── */
    function handleClick() {
      if (phase === 'anim') return;
      const card = document.getElementById('card');

      if (phase === 'down') {
        card.classList.add('flipped');
        phase = 'up';
        // Stagger content once flip is halfway (motion-framer: entrance pattern)
        setTimeout(() => motionStaggerContent(document.getElementById('back')), 480);
        return;
      }

      if (phase === 'up') {
        if (step === TOTAL - 1) return; // last card — use restart button
        phase = 'anim';
        card.classList.add('flyoff');
        setTimeout(() => {
          step++;
          refreshDots();
          loadStep(step);
          card.classList.remove('flyoff'); // mantém 'flipped' → back já visível
          if (M && !prefersReduced) {
            M.animate(card, { opacity: [0, 1], scale: [0.92, 1] }, { duration: 0.35, easing: 'ease-out' });
          } else {
            card.style.opacity = '1';
          }
          phase = 'up'; // já com conteúdo visível, próximo toque avança direto
        }, 700);
      }
    }

    refreshDots();

    /* ─── Card entrance on load (motion-framer: spring entrance) ─── */
    window.addEventListener('load', () => {
      motionEntranceCard();
    });
  </script>
